<main class="Content-Wrapper">
    <section class="Content">
        <form class="games-from">
            <div>
                <mat-form-field appearance="outline" class="form-input">
                    <mat-label>Title</mat-label>
                    <input  matInput>
                </mat-form-field>

                <mat-form-field appearance="outline" class="form-input">
                    <mat-label>Platform</mat-label>
                    <input  matInput>
                    <mat-hint align="end">Ex: PC, PS5, Xbox...</mat-hint>
                </mat-form-field>

                <mat-form-field appearance="outline" class="form-input">
                    <mat-label>Textarea</mat-label>
                    <textarea matInput></textarea>
                </mat-form-field>
                
                <mat-form-field appearance="outline" class="form-input">
                    <mat-label>Favorite Characters</mat-label>
                    <input  matInput>
                </mat-form-field>

                <mat-form-field appearance="outline" class="form-input">
                    <mat-label>Ratting</mat-label>
                    <input  matInput type="number">
                    <mat-hint align="end">Pick a number between 0 and 100</mat-hint>
                </mat-form-field>

                <mat-form-field appearance="outline" class="form-input">
                    <mat-label>Poster url</mat-label>
                    <input  matInput>
                </mat-form-field>
            </div>
            <button class="search-btn" mat-stroked-button color="primary">Add Review</button>
        </form>
    </section>
</main>
